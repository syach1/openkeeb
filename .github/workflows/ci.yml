name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Compile check
        run: python -m compileall build_offline_mirror.py serve_offline.py src

      - name: Run tests
        run: pytest -q
